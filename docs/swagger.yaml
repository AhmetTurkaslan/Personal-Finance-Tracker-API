basePath: /
definitions:
  handlers.CategoryInput:
    properties:
      category_name:
        type: string
      parent_id:
        type: integer
      type:
        type: string
    required:
    - category_name
    - type
    type: object
  handlers.LoginInput:
    properties:
      identifier:
        type: string
      password:
        type: string
    required:
    - identifier
    - password
    type: object
  handlers.RegisterInput:
    properties:
      email:
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - email
    - password
    - username
    type: object
  handlers.TransactionInput:
    properties:
      comment:
        type: string
      ttype:
        type: string
      value:
        type: number
    required:
    - ttype
    - value
    type: object
  models.BudgetInput:
    properties:
      category_id:
        type: integer
      limit:
        type: number
      month:
        type: integer
      year:
        type: integer
    required:
    - category_id
    - limit
    - month
    - year
    type: object
host: localhost:8080
